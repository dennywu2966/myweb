server {
    listen 80 default_server;
    server_name _;
    index index.html;

    # Redirect /staging to /staging/
    location = /staging {
        return 301 /staging/;
    }

    # Serve static files under /staging/ prefix
    location /staging/ {
        alias /home/web/projects/staging/myweb/dist/;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache Astro hashed assets
    location ~* ^/staging/_astro/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /home/web/projects/staging/myweb/dist/;
        rewrite ^/staging(.*)$ $1 break;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
