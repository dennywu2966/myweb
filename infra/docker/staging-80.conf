server {
    listen 80 default_server;
    server_name _;
    root /home/web/projects/staging/myweb;
    index index.html;

    location /staging/ {
        alias /home/web/projects/staging/myweb/dist/;
        try_files $uri $uri/index.html $uri.html =404;
    }

    location / {
        return 301 http://www.winter-prosper.com/staging/$request_uri;
    }

    location ~ ^/staging/_astro/.+\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
