server {
    server_name www.winter-prosper.com winter-prosper.com;

    root /home/web/projects/production/myweb/current/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/www.winter-prosper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.winter-prosper.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name www.winter-prosper.com winter-prosper.com;
    return 301 https://$host$request_uri;
}
