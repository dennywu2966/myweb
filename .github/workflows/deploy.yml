name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Setup SSH Key for Rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

      - name: Deploy to Server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.astro' \
            ./dist/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/web/projects/staging/myweb/dist/

      - name: Deploy Docker Config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no" \
            ./infra/docker/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/web/projects/staging/myweb/infra/docker/

      - name: Setup and Restart Docker Container
        run: |
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            cd /home/web/projects/staging/myweb/infra/docker
            docker compose down 2>/dev/null || true
            docker compose up -d --pull always
            docker ps
          ENDSSH