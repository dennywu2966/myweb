name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            ssh $STAGING_USER@$STAGING_HOST "mkdir -p /home/web/projects/staging/myweb"
            rsync -avz --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='node_modules' \
              --exclude='.astro' \
              ./dist/ $STAGING_USER@$STAGING_HOST:/home/web/projects/staging/myweb/
            echo "Deployment completed at $(date)"