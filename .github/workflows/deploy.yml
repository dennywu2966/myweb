name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Setup SSH Key for Rsync
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" | base64 -d > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

      - name: Ensure Directory Structure Exists
        run: |
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            mkdir -p /home/web/projects/staging/myweb/infra/docker
            mkdir -p /home/web/projects/staging/myweb/dist
          ENDSSH

      - name: Deploy to Server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.astro' \
            ./dist/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/web/projects/staging/myweb/dist/

      - name: Deploy Infrastructure Config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no" \
            ./infra/docker/ ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/home/web/projects/staging/myweb/infra/docker/

      - name: Deploy nginx Config
        run: |
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S cp /home/web/projects/staging/myweb/infra/docker/staging-80.conf /etc/nginx/sites-available/staging-80
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S ln -sf /etc/nginx/sites-available/staging-80 /etc/nginx/sites-enabled/staging-80
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/denny.conf /etc/nginx/sites-enabled/staging
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S chmod -R 755 /home/web/projects/staging/myweb/
          ENDSSH

      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S nginx -t
            echo '${{ secrets.STAGING_SUDO_PASS }}' | sudo -S nginx -s reload
          ENDSSH