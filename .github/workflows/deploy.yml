name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy Files and Configure Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            cd /home/web/projects/staging/myweb
            cat > staging.conf << 'EOF'
server {
    listen 8080;
    server_name localhost;
    root /home/web/projects/staging/myweb;
    index index.html;
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
EOF
            sudo cp staging.conf /etc/nginx/sites-available/staging
            sudo ln -sf /etc/nginx/sites-available/staging /etc/nginx/sites-enabled/staging
            sudo nginx -t && sudo nginx -s reload || sudo nginx